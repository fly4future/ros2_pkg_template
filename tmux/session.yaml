root: ./
name: ros2_pkg_template
socket_name: f4f
attach: false

enable_pane_titles: true
pane_title_position: top
pane_title_format: "[ #T ]"

startup_window: router
pre_window:
  - export UAV_NAME=uav1
  - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
windows:
  - router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - ros2_pkg_template:
      layout: tiled
      panes:
        - launch:
            - history -s "ros2 launch ros2_pkg_template ros2_template.launch.py"
            - history -s "ros2 launch ros2_pkg_template ros2_template.launch.xml"
        - echo:
            - sleep 3
            - ros2 topic echo /$UAV_NAME/ros2_pkg_template/greetings
        - services:
            - history -s "ros2 service call /$UAV_NAME/ros2_pkg_template/allow_publishing std_srvs/srv/Trigger {}"
            - history -s "ros2 service call /$UAV_NAME/ros2_pkg_template/ban_publishing std_srvs/srv/Trigger {}"

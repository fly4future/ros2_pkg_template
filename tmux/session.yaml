# do not modify these
root: ./
name: ros2_template
socket_name: mrs
attach: false
startup_window: status
pre_window: 
  - export UAV_NAME=uav1
  - export RMW_IMPLEMENTATION=rmw_zenoh_cpp
windows:
  - router:
      layout: tiled
      panes:
        - ros2 run rmw_zenoh_cpp rmw_zenohd
  - f4f_ros2_template:
      layout: tiled
      panes:
        - ros2 launch f4f_ros2_template ros2_template.launch.py
        - sleep 3; ros2 topic echo /$UAV_NAME/ros2_template/greetings
        - 'history -s ros2 service call /$UAV_NAME/ros2_template/allow_publishing std_srvs/srv/Trigger {}'
        - 'history -s ros2 service call /$UAV_NAME/ros2_template/ban_publishing std_srvs/srv/Trigger {}'
